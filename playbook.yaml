- hosts: all
  remote_user: ec2-user
  become: yes

  vars:
    tomcat_path: "/opt/tomcat/webapps"

  tasks:
    - name: Deploy WAR file to Tomcat server
      copy:
        src: "{{ war_file }}"
        dest: "{{ tomcat_path }}/todo.war.new"

    - name: Rename WAR file to activate deployment
      command: "mv {{ tomcat_path }}/todo.war.new {{ tomcat_path }}/todo.war"
